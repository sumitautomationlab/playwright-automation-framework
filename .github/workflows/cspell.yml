name: Spellcheck

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.ts'
      - '**/*.js'
      - 'cspell.json'

permissions:
  contents: read

jobs:
  cspell:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run cspell (advisory only)
        continue-on-error: true
        run: |
          npm run spellcheck || \
          echo "::warning::cspell found typos. Review the log above. This check is advisory and does not block merging."
